<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parlons de Votre Projet - Rénovation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-gold { background-color: #e2c456; color: white; transition: all 0.3s; }
        .btn-gold:hover { background-color: #d1b345; transform: translateY(-1px); shadow: 0 4px 12px rgba(226, 196, 86, 0.3); }
        input, select { border: 1px solid #e5e7eb; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #2563eb; outline: none; ring: 2px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="form-container" class="max-w-2xl w-full bg-white rounded-[30px] shadow-2xl p-8 md:p-12 relative">
        
        <div id="stepper-nav" class="flex justify-center space-x-2 mb-8">
            <div id="dot1" class="h-1.5 w-10 rounded-full bg-blue-600 transition-all duration-300"></div>
            <div id="dot2" class="h-1.5 w-1.5 rounded-full bg-gray-200 transition-all duration-300"></div>
        </div>

        <div id="form-header" class="text-center mb-10">
            <h1 class="serif text-3xl md:text-4xl text-gray-900 mb-2">Parlons de Votre Projet</h1>
            <p class="text-gray-500">Nos artisans alsaciens sont à votre écoute pour donner vie à vos idées</p>
        </div>

        <form id="multiStepForm" action="https://formspree.io/f/mvzbebpw" method="POST">
            
            <div class="step active" id="step1">
                <h2 class="font-semibold text-center text-gray-800 mb-8 uppercase tracking-widest text-sm">Vos coordonnées</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Prénom</label>
                        <input type="text" name="prenom" required placeholder="Jean" class="w-full p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Nom</label>
                        <input type="text" name="nom" required placeholder="Dupont" class="w-full p-4 rounded-xl">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Email</label>
                        <input type="email" name="email" required placeholder="jean.dupont@exemple.com" class="w-full p-4 rounded-xl">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Téléphone</label>
                        <input type="tel" id="phone" name="telephone" required placeholder="06 00 00 00 00" class="w-full p-4 rounded-xl">
                    </div>
                </div>
                <button type="button" onclick="nextStep()" class="w-full mt-10 btn-gold font-bold py-5 rounded-2xl shadow-lg flex justify-center items-center">
                    Continuer <span class="ml-2">→</span>
                </button>
            </div>

            <div class="step" id="step2">
                <h2 class="font-semibold text-center text-gray-800 mb-8 uppercase tracking-widest text-sm">Votre projet</h2>
                <div class="mb-8">
                    <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">Type de projet</label>
                    <select name="service" required class="w-full p-4 rounded-xl bg-white appearance-none cursor-pointer">
                        <option value="">Sélectionnez un service</option>
                        <option value="Rénovation Salle de Bain">Rénovation Salle de Bain</option>
                        <option value="Chauffage">Chauffage</option>
                        <option value="Performance Énergétique">Performance Énergétique</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="flex flex-col md:flex-row gap-4">
                    <button type="button" onclick="prevStep()" class="w-full md:w-1/3 bg-gray-50 text-gray-500 font-bold py-5 rounded-2xl border border-gray-100 transition-colors hover:bg-gray-100">
                        ← Retour
                    </button>
                    <button type="submit" id="submitBtn" class="w-full md:w-2/3 btn-gold font-bold py-5 rounded-2xl shadow-lg">
                        Envoyer ma demande
                    </button>
                </div>
            </div>

        </form>

        <div id="success-message" class="hidden text-center py-10 animate-fadeIn">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">✓</div>
            <h2 class="serif text-3xl text-gray-900 mb-4">C'est envoyé !</h2>
            <p class="text-gray-600 leading-relaxed">Merci pour votre confiance. Nos artisans alsaciens étudient votre projet et reviendront vers vous sous 48h.</p>
        </div>
    </div>

    <script>
        // 1. Masque de saisie Téléphone Français
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})(\d{0,2})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : x[1] + ' ' + x[2] + (x[3] ? ' ' + x[3] : '') + (x[4] ? ' ' + x[4] : '') + (x[5] ? ' ' + x[5] : '');
        });

        // 2. Navigation du Stepper
        function nextStep() {
            // Petite validation simple pour l'étape 1
            const inputs = document.querySelectorAll('#step1 input');
            let valid = true;
            inputs.forEach(input => { if(!input.checkValidity()) { input.reportValidity(); valid = false; } });
            
            if(valid) {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                document.getElementById('dot1').className = "h-1.5 w-1.5 rounded-full bg-gray-200 transition-all duration-300";
                document.getElementById('dot2').className = "h-1.5 w-10 rounded-full bg-blue-600 transition-all duration-300";
            }
        }

        function prevStep() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('dot2').className = "h-1.5 w-1.5 rounded-full bg-gray-200 transition-all duration-300";
            document.getElementById('dot1').className = "h-1.5 w-10 rounded-full bg-blue-600 transition-all duration-300";
        }

        // 3. Gestion de l'envoi Formspree avec redirection interne
        const form = document.getElementById("multiStepForm");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Envoi en cours...";

            const data = new FormData(e.target);
            
            try {
                const response = await fetch(e.target.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // Cacher le formulaire et le header, montrer le succès
                    form.classList.add('hidden');
                    document.getElementById('form-header').classList.add('hidden');
                    document.getElementById('stepper-nav').classList.add('hidden');
                    document.getElementById('success-message').classList.remove('hidden');
                } else {
                    alert("Une erreur est survenue. Veuillez réessayer.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Envoyer ma demande";
                }
            } catch (error) {
                alert("Erreur de connexion. Vérifiez votre accès internet.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Envoyer ma demande";
            }
        });
    </script>
</body>
</html>
